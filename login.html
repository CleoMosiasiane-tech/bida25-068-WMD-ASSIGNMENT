<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <header>
    <nav class="navbar navbar-expand-lg shadow sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Salted Butter Bakery</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="product.html">Our Product</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="order.html">Order Confirmation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">Feedback</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>

    </nav> 
  </header>
    <div class="wrapper login-animate">
        <form action="">
            <h1>Welcome!</h1>
            <p>Sign in to order your favorite pastries and track your order</p>
            <div class="input-box">
                <input type="text" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="remember-forget">
                <label><input type="checkbox"> Remember me </label>
                <a href="#"> Forgot password? </a>
            </div>
            <button type="Enter" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account? <a href="#"> Register</a></p>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function(){
            const loginBox= document.querySelector(".login-animate");
            setTimeout(() =>{
                loginBox.classList.add ("fade-in");
            },150);
        })
    </script>
</body>
</html>
