<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Custom CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">Salted butter bakery</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"></button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="product.html">Our Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="order.html">Order Confirmation</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="feedback.html">Feedback</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="receipt-section">
            <h1>Your Order Summary</h1>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price(P)</th>
                        <th>Subtotal(P)</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3"><strong>Total</strong></td>
                        <td id="orderTotal"><strong>P0.00</strong></td>
                    </tr>
                </tfoot>
            </table>
        </section>
        <section class="confirmation">
            <p><strong>ORDER CONFIRMED</strong></p>
        </section>
        <p class="orderId"><strong>Order-ID:#<span id="orderId"></span></strong></p>
        <p>Your order is being prepared and it will ready soon.</p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script>
        document.getElementById("orderId").textContent = Math.floor(Math.random() * 90000) + 10000;
        const cart = JSON.parse(localStorage.getItem("bakeryCart")) || [];
        const tbody = document.getElementById("orderTableBody");
        let total = 0;
        if (cart.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4'>No items ordered.</td></tr>";
        } else {
            cart.forEach(item => {
                const subtotal = (parseFloat(item.price) * item.quantity).toFixed(2);
                total += parseFloat(subtotal);
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>P${item.price}</td>
                        <td>P${subtotal}</td>
                    </tr>
                `;
            });
        }
        document.getElementById("orderTotal").innerHTML = "<strong>P" + total.toFixed(2) + "</strong>";
    </script>
</body>
</html>
