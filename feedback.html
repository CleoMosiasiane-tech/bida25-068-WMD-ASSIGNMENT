<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Custom CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">Salted butter bakery</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"></button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="product.html">Our Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="order.html">Order Confirmation</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="feedback.html">Feedback</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="feedback-section">
            <h1>Salted Butter Bakery values your feedback</h1>
            <form id="feedbackForm">
                <div class="user-info">
                    <label for="name"> Enter Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <h2>Type of Feedback</h2>
                <div>
                    <label for="feedback-type"> Select Feedback Type</label>
                    <select id="feedback-type" name="feedback-type" required>
                        <option value="compliment">Compliment</option>
                        <option value="Suggestion">Suggestion</option>
                        <option value="complaint">Complaint</option>
                    </select>
                </div>
                <div>
                    <label for="message">Your feedback</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>
                <div>
                    <button type="submit">Submit Feedback</button>
                </div>
            </form>
            <div id="thankYouMessage" style="display: none;">
                <h2>Thank You!</h2>
                <p>Your feedback has been submitted successfully.</p>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
